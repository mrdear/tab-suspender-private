<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=350, height=600">
  <title>Tab Suspender</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="popup-container">
    <!-- Header -->
    <header class="header">
      <div class="logo">
        <img src="icons/icon32.png" alt="Tab Suspender" class="logo-icon">
        <span class="logo-text">Tab Suspender</span>
      </div>
      <button class="settings-btn" id="settingsBtn" title="Settings">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="12" cy="12" r="3"></circle>
          <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"></path>
        </svg>
      </button>
    </header>

    <!-- Hero Section - Single Dominant Metric -->
    <div class="hero-section">
      <div class="hero-value" id="memorySaved">0 MB</div>
      <div class="hero-label">MEMORY FREED</div>
      <div class="hero-emotion" id="heroEmotion">Suspend tabs to free memory</div>

      <div class="health-bar">
        <div class="health-bar-track">
          <div class="health-bar-fill" id="healthBarFill"></div>
        </div>
        <div class="health-bar-label">
          <span id="healthPercent">0%</span> lighter
        </div>
      </div>

      <div class="hero-stats-subtle">
        <span><strong id="suspendedCount">0</strong> suspended</span>
        <span class="dot">·</span>
        <span><strong id="totalTabCount">0</strong> total</span>
        <span class="dot">·</span>
        <span><strong id="windowCount">0</strong> windows</span>
      </div>
    </div>

    <!-- Primary Action - Full Width -->
    <button class="btn-primary-large" id="suspendAllBtn">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
        <rect x="6" y="4" width="4" height="16"></rect>
        <rect x="14" y="4" width="4" height="16"></rect>
      </svg>
      <span>Suspend Other Tabs</span>
    </button>

    <!-- Secondary Actions -->
    <div class="secondary-actions">
      <button class="btn-secondary" id="restoreAllBtn">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <polygon points="5 3 19 12 5 21 5 3"></polygon>
        </svg>
        Restore All
      </button>
      <button class="btn-secondary" id="whitelistBtn" title="Whitelist current site">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"></path>
        </svg>
        Whitelist
      </button>
    </div>

    <!-- Collapsed Tab List -->
    <div class="tabs-section">
      <button class="tabs-toggle" id="tabsToggle">
        <span class="tabs-summary">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect>
            <line x1="3" y1="9" x2="21" y2="9"></line>
          </svg>
          <span id="tabsSummaryText">0 tabs across 0 windows</span>
        </span>
        <svg class="chevron" id="tabsChevron" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <polyline points="6 9 12 15 18 9"></polyline>
        </svg>
      </button>

      <div class="tabs-expanded" id="tabsExpanded" style="display: none;">
        <div class="tabs-filter">
          <select id="filterSelect">
            <option value="all">All tabs</option>
            <option value="active">Active</option>
            <option value="suspended">Suspended</option>
          </select>
        </div>
        <div class="tabs-list" id="tabsList">
          <div class="loading">Loading...</div>
        </div>
      </div>
    </div>

    <!-- Footer -->
    <footer class="footer">
      <span class="footer-link">Tab Suspender</span>
      <span class="version">v1.0.20</span>
    </footer>
  </div>

  <!-- Toast for Exclusion Feedback -->
  <div id="exclusion-toast" class="toast" role="alert" aria-live="polite">
    <div class="toast-content">
      <span class="toast-message" id="exclusion-message"></span>
      <button class="toast-close" id="exclusion-toast-close">×</button>
    </div>
    <div class="toast-details" id="exclusion-details" style="display: none;">
      <div id="exclusion-reasons-list"></div>
    </div>
    <button class="toast-toggle" id="exclusion-details-toggle" style="display: none;">
      Show details
    </button>
  </div>

  <script src="popup.js"></script>
</body>
</html>
